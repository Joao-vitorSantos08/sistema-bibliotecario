<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastrar-se</title>
</head>
<body>
	<h1>Cadastro</h1>
	
	<form th:action="@{/gravar}" method="post">
		<div>
			<label>Usuário</label>
			<input type="text" name="username" />
		</div>
		<div>
			<label>Senha</label>
			<input type="password" name="password" />
		</div>
		
		<button type="submit">Gravar</button>
	</form>

</body>
</html>
