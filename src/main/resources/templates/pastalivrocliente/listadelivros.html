<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Catálogo de Livros | Biblioteca</title>
<link rel="stylesheet" type="text/css" th:href="@{/style/livrocliente.css}">
</head>
<body>
	<div class="main-container">
		<header class="admin-header">
			<div>
				<span class="admin-badge">Acervo Digital</span>
				<h1 class="livro-titulo">Nossa Livraria</h1>
			</div>
			<div class="rota">
				<a th:href="@{/homecliente}" class="btn-novo">Voltar para o Início</a>
			</div>
		</header>

		<div class="table-responsive">
			<table class="table">
				<thead>
					<tr>
						<th>Obra / Resumo</th>
						<th>Editora</th>
						<th>Autores</th>
						<th>Páginas</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="l : ${livros}">
						<td style="max-width: 300px;">
							<div class="obra-nome" th:text="${l.titulo}" style="font-weight: 700;">Título</div> 
							<small class="text-resumo" th:text="${l.detalhelivro?.detalhes}">Resumo...</small>
						</td>

						<td>
						
							<span class="isbn-text" th:text="${l.editora?.editora}">Editora</span>
						</td>

						<td>
							<div th:each="a : ${l.autores}">
								<span class="autor-nome" th:text="${a.nome}" style="display: block; font-size: 0.9rem;"></span>
							</div>
						</td>

						<td>
							<span th:text="${l.detalhelivro?.npaginas}">0</span> págs
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>
