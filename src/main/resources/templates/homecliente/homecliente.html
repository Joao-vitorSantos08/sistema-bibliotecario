<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo | Biblioteca</title>
    <!-- Importando as fontes necessárias para o seu novo CSS -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" type="text/css" th:href="@{/style/index.css}">
</head>
<body>

    <!-- Botão de Sair posicionado conforme seu estilo limpo -->
    <form th:action="@{/logout}" method="post" style="position: absolute; top: 20px; right: 20px;">
        <button type="submit" style="background: none; border: 1px solid #000; padding: 8px 16px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.7rem;">Sair</button>
    </form>

    <div class="home-container">
        <header class="home-header">
            <span class="admin-badge">Plataforma de Gestão</span>
            <h1 class="home-title">Acervo Literário</h1>
            <p class="home-subtitle">Selecione o módulo que deseja gerenciar abaixo.</p>
        </header>

        <nav class="home-nav">
            <!-- Link ajustado para a rota correta que vimos antes -->
            <a th:href="@{/homecliente/livraria}" class="home-card"> 
                <span class="card-number">01</span>
                <div class="card-info">
                    <h2>Livros</h2>
                    <p>Livro que temos no momento</p>
                </div> 
                <span class="card-arrow">→</span>
            </a>
            
          
        </nav>

        <footer class="home-footer">
            <p>&copy; 2026 Sistema de Biblioteca Digital - Modo Administrativo</p>
        </footer>
    </div>

</body>
</html>
