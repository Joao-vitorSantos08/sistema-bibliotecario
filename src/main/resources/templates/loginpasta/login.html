<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 300px;
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
    }

    p {
        color: #666;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background-color: #0056b3;
    }

    .link {
        margin-top: 10px;
        display: block;
    }

    .erro {
        color: red;
        margin-top: 10px;
    }

    .sucesso {
        color: green;
        margin-top: 10px;
    }

    .info {
        margin-top: 20px;
        font-size: 13px;
        color: #444;
        text-align: left;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Login</h1>
    <p>Entre com seu usuário e senha</p>


    <div class="erro" th:if="${param.erro}">
        Usuário ou senha inválidos
    </div>

    <div class="sucesso" th:if="${param.logout}">
        Logout realizado com sucesso
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Usuário" autocomplete="username" required />
        <input type="password" name="password" placeholder="Senha" required />
        <button type="submit">Entrar</button>
    </form>

    <div class="info">
        <strong>Usuários para teste:</strong><br>
        Admin → admin / admin123<br>
        Cliente → cliente / cliente123
    </div>

</div>

</body>
</html>
